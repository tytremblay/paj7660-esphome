substitutions:
  device_name: pag7660-gesture
  friendly_name: PAG7660 Gesture Sensor
  project_name: local.pag7660_gesture
  project_version: "0.2.0"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.2.0
  project:
    name: ${project_name}
    version: ${project_version}

external_components:
  - source:
      type: local
      path: components
    components: [pag7660]

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

text_sensor:
  - platform: pag7660
    name: "${friendly_name} Gesture"
    gesture_mode: combined
    update_interval: 100ms

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 60s

switch:
  - platform: restart
    name: "${friendly_name} Restart"
